<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokcho Vibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC5Qw1cfwt5grau7BJXBStddjZwQNRPotQ",
            authDomain: "sokcho-3b218.firebaseapp.com",
            databaseURL: "https://sokcho-3b218-default-rtdb.firebaseio.com",
            projectId: "sokcho-3b218",
            storageBucket: "sokcho-3b218.firebasestorage.app",
            messagingSenderId: "21005682724",
            appId: "1:21005682724:web:36d3b0aa0146fc699d70b1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const scheduleRef = ref(db, 'schedule');
        const candidateRef = ref(db, 'candidates');

        // --- 기능 로직 ---
        window.addNewItem = function() {
            const currentTab = document.getElementById('schedule-view').classList.contains('hidden') ? 'candidate' : 'schedule';
            const targetRef = currentTab === 'schedule' ? scheduleRef : candidateRef;
            const newItemRef = push(targetRef);
            set(newItemRef, {
                title: currentTab === 'schedule' ? '새 일정' : '새 장소',
                time: '00:00',
                memo: '',
                link: '',
                done: false,
                timestamp: Date.now()
            });
        };

        window.updateItem = (id, field, value, tab) => {
            const itemRef = ref(db, `${tab}/${id}`);
            update(itemRef, { [field]: value });
        };

        window.deleteItem = (id, tab) => {
            if(confirm('삭제하시겠습니까?')) remove(ref(db, `${tab}/${id}`));
        };

        window.toggleDone = (id, currentStatus) => {
            update(ref(db, `schedule/${id}`), { done: !currentStatus });
        };

        // 실시간 데이터 감시 및 렌더링
        onValue(scheduleRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    container.innerHTML += `
                        <div class="ios-card p-4 space-y-2 ${item.done ? 'done' : ''}">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-circle-minus delete-btn text-red-500 hidden" onclick="deleteItem('${key}', 'schedule')"></i>
                                <input type="checkbox" class="check-box w-5 h-5 accent-blue-500" ${item.done ? 'checked' : ''} onclick="toggleDone('${key}', ${item.done})">
                                <input type="text" value="${item.title}" class="font-bold text-lg flex-1 bg-transparent outline-none" onchange="updateItem('${key}', 'title', this.value, 'schedule')">
                                <input type="text" value="${item.time}" class="w-12 text-xs text-blue-500 font-mono text-right bg-transparent outline-none" onchange="updateItem('${key}', 'time', this.value, 'schedule')">
                            </div>
                            <textarea class="text-sm text-gray-500 w-full bg-transparent outline-none ml-8" placeholder="메모..." onchange="updateItem('${key}', 'memo', this.value, 'schedule')">${item.memo}</textarea>
                        </div>`;
                });
            }
        });

        onValue(candidateRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('candidate-list');
            container.innerHTML = '';
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    container.innerHTML += `
                        <div class="ios-card p-4 space-y-2">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-circle-minus delete-btn text-red-500 hidden" onclick="deleteItem('${key}', 'candidates')"></i>
                                <input type="text" value="${item.title}" class="font-bold text-lg flex-1 bg-transparent outline-none" onchange="updateItem('${key}', 'title', this.value, 'candidates')" placeholder="장소 이름">
                                <i class="fa-solid fa-location-arrow text-blue-500" onclick="window.open('${item.link}', '_blank')"></i>
                            </div>
                            <input type="text" value="${item.link}" class="text-[10px] text-blue-400 w-full bg-transparent outline-none" placeholder="네이버 플레이스 링크 붙여넣기" onchange="updateItem('${key}', 'link', this.value, 'candidates')">
                        </div>`;
                });
            }
        });

        window.toggleEditMode = () => {
            const btns = document.querySelectorAll('.delete-btn');
            const checks = document.querySelectorAll('.check-box');
            const isEditing = btns[0]?.classList.contains('hidden');
            btns.forEach(b => b.classList.toggle('hidden'));
            checks.forEach(c => c.classList.toggle('hidden'));
            document.getElementById('edit-btn').innerText = isEditing ? 'Done' : 'Edit';
        };

        window.switchTab = (tab) => {
            const sched = document.getElementById('schedule-view');
            const candi = document.getElementById('candidate-view');
            const navBtns = document.querySelectorAll('nav button');
            if(tab === 'schedule') {
                sched.classList.remove('hidden'); candi.classList.add('hidden');
                navBtns[0].classList.add('text-blue-500'); navBtns[1].classList.remove('text-blue-500');
            } else {
                sched.classList.add('hidden'); candi.classList.remove('hidden');
                navBtns[1].classList.add('text-blue-500'); navBtns[0].classList.remove('text-blue-500');
            }
        };
    </script>
    <style>
        :root { --bg: #ffffff; --card: #f2f2f7; --text: #000000; --accent: #007aff; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --accent: #0a84ff; } }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .ios-card { background-color: var(--card); border-radius: 16px; border: 0.5px solid rgba(128,128,128,0.2); }
        .done { opacity: 0.3; filter: grayscale(1); }
        .fab { position: fixed; bottom: 100px; right: 25px; width: 60px; height: 60px; background: var(--accent); border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 50; }
    </style>
</head>
<body class="pb-32">
    <header class="p-6 pt-12 flex justify-between items-end">
        <div><h1 class="text-3xl font-extrabold tracking-tight">Sokcho Trip</h1><p class="text-gray-500 text-xs font-bold uppercase tracking-widest mt-1">Realtime Sync</p></div>
        <button id="edit-btn" onclick="toggleEditMode()" class="text-blue-500 text-sm font-semibold">Edit</button>
    </header>

    <main id="schedule-view" class="px-5 space-y-4"><div id="list-container" class="space-y-3"></div></main>
    <main id="candidate-view" class="hidden px-5 space-y-4"><div id="candidate-list" class="space-y-3"></div></main>

    <div class="fab text-white text-2xl" onclick="addNewItem()"><i class="fa-solid fa-plus"></i></div>

    <nav class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-black/80 backdrop-blur-xl border-t border-gray-200 dark:border-gray-800 flex justify-around py-3 pb-8 z-40">
        <button onclick="switchTab('schedule')" class="flex flex-col items-center gap-1 text-blue-500"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px]">일정</span></button>
        <button onclick="switchTab('candidate')" class="flex flex-col items-center gap-1 text-gray-400"><i class="fa-solid fa-map-location-dot text-xl"></i><span class="text-[10px]">방문후보</span></button>
    </nav>
</body>
</html>
